name: Build and Push helloworld Image

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"

env:
  IMAGE_NAME: helloworld
  IMAGE_FULL_NAME: ghcr.io/ngwind/helloworld

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 1️⃣ 获取最新版本
      - name: Get latest version
        id: get_version
        run: |
          VERSION=$(curl -s https://api.github.com/repos/klzgrad/naiveproxy/releases/latest | jq -r '.tag_name')
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      # 2️⃣ 登录 GHCR（:contentReference[oaicite:0]{index=0} Container Registry）
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 3️⃣ 检查镜像是否已经存在（构建跳过逻辑）
      - name: Check if image exists
        id: check_image
        run: |
          if docker manifest inspect $IMAGE_FULL_NAME:${{ steps.get_version.outputs.version }} > /dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      # 4️⃣ 设置 Buildx（BuildKit）
      - name: Set up Docker Buildx
        if: steps.check_image.outputs.exists != 'true'
        uses: docker/setup-buildx-action@v3

      # 5️⃣ 构建并推送（带 registry cache）
      - name: Build and Push
        if: steps.check_image.outputs.exists != 'true'
        uses: docker/build-push-action@v5
        with:
          context: ./hellworld/
          push: true

          # 多架构
          platforms: linux/amd64,linux/arm64

          # 镜像 tag
          tags: |
            ${{ env.IMAGE_FULL_NAME }}:${{ steps.get_version.outputs.version }}
            ${{ env.IMAGE_FULL_NAME }}:latest

          # 传递版本给 Dockerfile
          build-args: |
            NAIVE_VERSION=${{ steps.get_version.outputs.version }}

          # ✅ registry cache（关键优化）
          cache-from: type=registry,ref=${{ env.IMAGE_FULL_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.IMAGE_FULL_NAME }}:buildcache,mode=max
